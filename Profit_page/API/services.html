
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Services</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="/css/site.css">
</head>
<body>
  <!-- Header Component -->
  <div id="header-component"></div>

  <div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Services</h2>
    <!-- The Add Service button opens a popup defined below -->
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addServiceModal">
      <i class="bi bi-plus-circle"></i> Add Service
    </button>
  </div>

  <!-- This is the main Service table, the data is loaded from the API using JavaScript below -->
  <div class="card shadow-sm">
    <div class="card-body">
      <table id="serviceTable" class="display table table-striped table-hover" style="width:100%">
        <thead>
          <tr><th>ID</th><th>Name</th><th>Cost</th></tr>
        </thead>
      </table>
    </div>
  </div>

  <!-- Add Service Modal Popup -->
  <div class="modal fade" id="addServiceModal" tabindex="-1" aria-labelledby="addServiceModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="addServiceModalLabel">Add New Service</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="addServiceForm">
            <div class="mb-3">
              <label for="serviceName" class="form-label">Service Name</label>
              <input type="text" id="serviceName" class="form-control" placeholder="Enter service name" required>
            </div>
            <div class="mb-3">
              <label for="cost" class="form-label">Cost</label>
              <input type="number" id="cost" class="form-control" placeholder="Enter cost" step="0.01" required>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" id="addBtn" class="btn btn-primary">Add Service</button>
        </div>
      </div>
    </div>
  </div>

  </div><!-- Close container -->

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

  <script type="text/javascript">
    $(document).ready(function() {
        const API_BASE = "http://localhost:8000";

      // This loads the data into the Services table on page load
      var table = $('#serviceTable').DataTable({
        ajax: {
          url: API_BASE + '/api/profits',
          dataSrc: ''
        },
        columns: [
          { data: 'id' },
          { data: 'ServiceName' },
          { 
            data: 'Cost',
            render: function(data, type, row) {
              if (type === 'display' || type === 'filter') {
                return '$' + parseFloat(data).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
              }
              return data;
            }
          }
        ]
      });

      $('#addBtn').on('click', function() {
        var serviceName = $('#serviceName').val();
        var cost = parseFloat($('#cost').val());

        if (!serviceName || isNaN(cost)) {
          showToast('Please fill in all fields');
          return;
        }

        // This adds a new service via the API
        $.ajax({
          url: API_BASE + '/api/profits',
          method: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({ category: serviceName, revenue: cost, expenses: 0, notes: '' }),
          success: function() {
            table.ajax.reload();
            $('#serviceName').val('');
            $('#cost').val('');
            // Close the modal
            $('#addServiceModal').modal('hide');
          },
          error: function(xhr, status, error) {
            showToast('Error adding service: ' + error);
          }
        });
      });
    });
  </script>
  <script src="js/app.js"></script>
</body>
</html>
