<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Grime Guys</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/site.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <!-- Header Component -->
    <div id="header-component"></div>

    <!-- Login Container -->
    <main class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Welcome Back</h1>
                <p>Sign in to your account</p>
                <div class="alert alert-danger d-none" id="loginError" role="alert"></div>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="login-form" novalidate>
                <!-- Username Input -->
                <div class="form-group mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="username" 
                        name="username"
                        placeholder="Enter your username"
                        autocomplete="username"
                        required
                    >
                    <div class="invalid-feedback" id="usernameError"></div>
                </div>

                <!-- Password Input -->
                <div class="form-group mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="password-input-group">
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password" 
                            name="password"
                            placeholder="Enter your password"
                            required
                        >
                        <button 
                            type="button" 
                            class="btn-toggle-password" 
                            id="togglePassword"
                            aria-label="Show/hide password"
                        >
                            <span class="password-icon">👁️</span>
                        </button>
                    </div>
                    <div class="invalid-feedback" id="passwordError"></div>
                </div>

                <!-- Remember Me Checkbox -->
                <div class="form-check mb-4">
                    <input 
                        class="form-check-input" 
                        type="checkbox" 
                        id="rememberMe" 
                        name="rememberMe"
                    >
                    <label class="form-check-label" for="rememberMe">
                        Remember me
                    </label>
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn btn-primary w-100 mb-3" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                    <span class="spinner-border spinner-border-sm ms-2 d-none" id="loginSpinner" role="status" aria-hidden="true"></span>
                </button>
            </form>
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Load header component -->
    <script src="js/app.js"></script>
    
    <!-- Login functionality -->
    <script src="js/login.js"></script>
</body>
</html>
