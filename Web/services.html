
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Services</title>

  <!-- Load Bootstrap CSS framework for styling -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <!-- Load DataTables CSS for the services table -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
  <!-- Load custom styles from site.css file -->
  <link rel="stylesheet" href="/css/site.css">
</head>
<body>
  <!-- Display the header component with navigation menu (loaded from header-component.html) -->
  <div id="header-component"></div>

  <div class="container mt-4">
    <!-- Page title and Add Service button -->
    <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Services</h2>
    <!-- The Add Service button opens a popup (modal) defined below -->
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addServiceModal">
      <i class="bi bi-plus-circle"></i> Add Service
    </button>
  </div>

  <!-- Services table - displays all services with their ID, name, and cost -->
  <div class="card shadow-sm">
    <div class="card-body">
      <table id="serviceTable" class="display table table-striped table-hover" style="width:100%">
        <thead>
          <!-- Column headers for the services table -->
          <tr><th>ID</th><th>Name</th><th>Cost</th></tr>
        </thead>
      </table>
    </div>
  </div>

  <!-- Modal Popup - form to add a new service -->
  <div class="modal fade" id="addServiceModal" tabindex="-1" aria-labelledby="addServiceModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <!-- Modal header with title and close button -->
        <div class="modal-header">
          <h5 class="modal-title" id="addServiceModalLabel">Add New Service</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <!-- Modal body with input fields for service name and cost -->
        <div class="modal-body">
          <form id="addServiceForm">
            <div class="mb-3">
              <label for="serviceName" class="form-label">Service Name</label>
              <input type="text" id="serviceName" class="form-control" placeholder="Enter service name" required>
            </div>
            <div class="mb-3">
              <label for="cost" class="form-label">Cost</label>
              <input type="number" id="cost" class="form-control" placeholder="Enter cost" step="0.01" required>
            </div>
          </form>
        </div>
        <!-- Modal footer with Cancel and Add Service buttons -->
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" id="addBtn" class="btn btn-primary">Add Service</button>
        </div>
      </div>
    </div>
  </div>

  </div><!-- Close container -->

  <!-- Load jQuery library for DOM manipulation -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Load Bootstrap JavaScript for interactive components like modals and buttons -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Load DataTables library for table functionality -->
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

  <script type="text/javascript">
    $(document).ready(function() {
        const API_BASE = "";

      // Load services data from the API and display in the table
      var table = $('#serviceTable').DataTable({
        ajax: {
          url: API_BASE + '/api/services',
          dataSrc: ''
        },
        // Define which data columns to display in the table
        columns: [
          { data: 'id' },
          { data: 'ServiceName' },
          { 
            data: 'Cost',
            // Format cost column to display as currency with dollar sign
            render: function(data, type, row) {
              if (type === 'display' || type === 'filter') {
                return '$' + parseFloat(data).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
              }
              return data;
            }
          }
        ]
      });

      // Handle Add Service button click - submit form data to the API
      $('#addBtn').on('click', function() {
        var serviceName = $('#serviceName').val();
        var cost = parseFloat($('#cost').val());

        if (!serviceName || isNaN(cost)) {
          showToast('Please fill in all fields');
          return;
        }

        // Send a POST request to the API to add a new service
        $.ajax({
          url: API_BASE + '/api/services',
          method: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({ ServiceName: serviceName, Cost: cost }),
          // If successful, reload the table and clear the form
          success: function() {
            table.ajax.reload();
            $('#serviceName').val('');
            $('#cost').val('');
            // Close the modal popup after adding service
            $('#addServiceModal').modal('hide');
          },
          // If there's an error, show error message to the user
          error: function(xhr, status, error) {
            showToast('Error adding service: ' + error);
          }
        });
      });
    });
  </script>
  <!-- Load custom JavaScript functionality from app.js to load the header -->
  <script src="js/app.js"></script>
</body>
</html>
