                <div class="job-meta">Date:</div>

  <script>
    /* Enhance table accessibility: announce job cards to screen readers */
    document.addEventListener('DOMContentLoaded', function() {
      const rows = document.querySelectorAll('.fancy-table tbody tr');
      rows.forEach((row, index) => {
        row.setAttribute('role', 'row');
        row.setAttribute('aria-rowindex', index + 2); /* +2 accounts for header row and 1-based indexing */
      });
    });
  </script>
  <script>
document.addEventListener("DOMContentLoaded", () => {
  const selects = document.querySelectorAll(".status-select");

  selects.forEach(select => {
    const applyClass = () => {
      select.classList.remove("status-scheduled", "status-inprogress", "status-complete");
      select.classList.add(`status-${select.value}`);
    };

    applyClass(); // set initial state
    select.addEventListener("change", applyClass);
  });
});
</script>
