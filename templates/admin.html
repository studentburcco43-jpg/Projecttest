<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>User Administration</title>
    <!-- Load Bootstrap CSS and custom styles -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/site.css?v=8">
</head>

<body>
    <!-- Header Component: navigation and toast container (loaded by app.js) -->
    <div id="header-component"></div>

    <main class="container my-5 fancy-table-wrapper">
        <h1 class="mb-4">User Administration</h1>
        <p class="text-muted">Overview of user management and administration tasks.</p>

        <!-- Add New User trigger -->
        <div class="mb-4">
            <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addUserModal">Add New User</button>
        </div>

        <!-- Users Table -->
        <section>
            <h2 class="h5 mb-3">Users</h2>
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle" id="usersTable">
                    <thead class="table-success">
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Last Login</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr><td colspan="6" class="text-center text-muted">Loading…</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Add User Modal -->
        <div class="modal fade" id="addUserModal" tabindex="-1" aria-labelledby="addUserModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="addUserModalLabel">Add New User</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="addUserForm">
                            <div class="mb-3">
                                <label for="newUsername" class="form-label">Username *</label>
                                <input type="text" id="newUsername" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="newFirstName" class="form-label">First Name *</label>
                                <input type="text" id="newFirstName" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="newLastName" class="form-label">Last Name *</label>
                                <input type="text" id="newLastName" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="newPassword" class="form-label">Password *</label>
                                <input type="password" id="newPassword" class="form-control" required>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-success" id="submitAddUserBtn">Add User</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit User Modal -->
        <div class="modal fade" id="editUserModal" tabindex="-1" aria-labelledby="editUserModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="editUserModalLabel">Edit User</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="editUserForm">
                            <input type="hidden" id="editUserId">
                            <div class="mb-3">
                                <label for="editUsername" class="form-label">Username</label>
                                <input type="text" id="editUsername" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label for="editFirstName" class="form-label">First Name</label>
                                <input type="text" id="editFirstName" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label for="editLastName" class="form-label">Last Name</label>
                                <input type="text" id="editLastName" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label for="editPassword" class="form-label">New Password <span class="text-muted">(leave blank to keep current)</span></label>
                                <input type="password" id="editPassword" class="form-control">
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-success" id="saveUserBtn">Save Changes</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-component"></div>

    <!-- Load Bootstrap JS and site script that loads the header -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
