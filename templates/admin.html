<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>User Administration</title>
    <!-- Load Bootstrap CSS and custom styles -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/site.css?v=8">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <!-- Header Component: navigation and toast container (loaded by app.js) -->
    <div id="header-component"></div>

    <main class="container my-5 fancy-table-wrapper">
        <h1 class="mb-4">User Administration</h1>
        <p class="text-muted">Overview of user management and administration tasks.</p>

        <!-- Add New User trigger -->
        <div class="mb-4">
            <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addUserModal">Add New User</button>
        </div>

        <!-- Users Table -->
        <section>
            <h2 class="h5 mb-3">Users</h2>
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle" id="usersTable">
                    <thead class="table-success">
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Last Login</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr><td colspan="6" class="text-center text-muted">Loading…</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Add User Modal -->
        <div class="modal fade" id="addUserModal" tabindex="-1" aria-labelledby="addUserModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="addUserModalLabel">Add New User</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="addUserForm">
                            <div class="mb-3">
                                <label for="newUsername" class="form-label">Username *</label>
                                <input type="text" id="newUsername" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="newFirstName" class="form-label">First Name *</label>
                                <input type="text" id="newFirstName" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="newLastName" class="form-label">Last Name *</label>
                                <input type="text" id="newLastName" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="newPassword" class="form-label">Password *</label>
                                <input type="password" id="newPassword" class="form-control" required>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-success" id="submitAddUserBtn">Add User</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit User Modal -->
        <div class="modal fade" id="editUserModal" tabindex="-1" aria-labelledby="editUserModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="editUserModalLabel">Edit User</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="editUserForm">
                            <input type="hidden" id="editUserId">
                            <div class="mb-3">
                                <label for="editUsername" class="form-label">Username</label>
                                <input type="text" id="editUsername" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label for="editFirstName" class="form-label">First Name</label>
                                <input type="text" id="editFirstName" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label for="editLastName" class="form-label">Last Name</label>
                                <input type="text" id="editLastName" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label for="editPassword" class="form-label">New Password <span class="text-muted">(leave blank to keep current)</span></label>
                                <input type="password" id="editPassword" class="form-control">
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-success" id="saveUserBtn">Save Changes</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-component"></div>

    <!-- Load Bootstrap JS and site script that loads the header -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        const addModal  = new bootstrap.Modal(document.getElementById('addUserModal'));
        const editModal = new bootstrap.Modal(document.getElementById('editUserModal'));

        async function loadUsers() {
            const res = await fetch('/api/users');
            if (!res.ok) { return; }
            const users = await res.json();
            const tbody = document.getElementById('usersTableBody');
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No users found.</td></tr>';
                return;
            }
            tbody.innerHTML = users.map(u => `
                <tr data-id="${u.id}">
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td>${u.FirstName}</td>
                    <td>${u.LastName}</td>
                    <td>${u.LastLoginDate ? new Date(u.LastLoginDate).toLocaleString() : '—'}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-success me-1" onclick="openEdit(${u.id}, '${u.username}', '${u.FirstName}', '${u.LastName}')">Edit</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteUser(${u.id})">Delete</button>
                    </td>
                </tr>`).join('');
        }

        document.getElementById('submitAddUserBtn').addEventListener('click', async () => {
            const form = document.getElementById('addUserForm');
            if (!form.reportValidity()) { return; }
            const body = {
                username: document.getElementById('newUsername').value,
                FirstName: document.getElementById('newFirstName').value,
                LastName: document.getElementById('newLastName').value,
                password: document.getElementById('newPassword').value,
            };
            const res = await fetch('/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            if (res.ok) {
                form.reset();
                addModal.hide();
                await loadUsers();
            } else {
                const err = await res.json();
                alert(err.detail ?? 'Failed to create user.');
            }
        });

        function openEdit(id, username, firstName, lastName) {
            document.getElementById('editUserId').value = id;
            document.getElementById('editUsername').value = username;
            document.getElementById('editFirstName').value = firstName;
            document.getElementById('editLastName').value = lastName;
            document.getElementById('editPassword').value = '';
            editModal.show();
        }

        document.getElementById('saveUserBtn').addEventListener('click', async () => {
            const id = document.getElementById('editUserId').value;
            const body = {
                username: document.getElementById('editUsername').value || null,
                FirstName: document.getElementById('editFirstName').value || null,
                LastName: document.getElementById('editLastName').value || null,
                password: document.getElementById('editPassword').value || null,
            };
            const res = await fetch(`/api/users/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            if (res.ok) {
                editModal.hide();
                await loadUsers();
            } else {
                const err = await res.json();
                alert(err.detail ?? 'Failed to update user.');
            }
        });

        async function deleteUser(id) {
            if (!confirm('Delete this user?')) { return; }
            const res = await fetch(`/api/users/${id}`, { method: 'DELETE' });
            if (res.ok) { await loadUsers(); }
            else {
                const err = await res.json();
                alert(err.detail ?? 'Failed to delete user.');
            }
        }

        loadUsers();
    </script>
</body>

</html>
