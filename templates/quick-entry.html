<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Entry - Job & Expense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/site.css?v=8">
    <link rel="stylesheet" href="css/quick-entry.css">
</head>
<body>
    <div id="header-component"></div>
    <div class="container">
        <div class="header">
            <h1>Grime Guys Quick Entry</h1>
            <p class="subtitle">Fast revenue and expense logging for growth</p>
        </div>

        <div class="main-content">
            <!-- Income Form -->
            <div class="form-card">
                <h2 class="form-title income">&#x1F4CA; Add Job (Income)</h2>
                <form id="incomeForm">
                    <div class="form-group">
                        <label for="incomeClient">Client <span class="required">*</span></label>
                        <input type="text" id="incomeClient" name="client_name" placeholder="Enter client name..." required>
                        <div class="error" id="incomeClientError"></div>
                    </div>

                    <div class="form-group">
                        <label for="incomeDate">Date <span class="required">*</span></label>
                        <input type="date" id="incomeDate" name="job_date" required>
                    </div>

                    <div class="form-group">
                        <label for="incomeService">Service <span class="required">*</span></label>
                        <select id="incomeService" name="service_id" required>
                            <option value="">Select a service...</option>
                        </select>
                        <div class="error" id="incomeServiceError"></div>
                    </div>

                    <div class="form-group">
                        <label for="incomeAmount">Amount <span class="required">*</span></label>
                        <div class="money-input-group">
                            <input type="number" id="incomeAmount" name="income" placeholder="0.00" min="0" step="0.01" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="incomeDetails">Details</label>
                        <textarea id="incomeDetails" name="service_details" placeholder="Job details..."></textarea>
                    </div>

                    <button type="submit" class="btn-submit">Add Job</button>
                </form>
            </div>

            <!-- Expense Form -->
            <div class="form-card">
                <h2 class="form-title expense">&#x1F4B0; Add Expense</h2>
                <form id="expenseForm">
                    <div class="form-group">
                        <label for="expenseClient">Client <span class="required">*</span></label>
                        <input type="text" id="expenseClient" name="client_name" placeholder="Enter client name..." required>
                        <div class="error" id="expenseClientError"></div>
                    </div>

                    <div class="form-group">
                        <label for="expenseDate">Date <span class="required">*</span></label>
                        <input type="date" id="expenseDate" name="expense_date" required>
                    </div>

                    <div class="form-group">
                        <label for="expenseAmount">Amount <span class="required">*</span></label>
                        <div class="money-input-group">
                            <input type="number" id="expenseAmount" name="expenses" placeholder="0.00" min="0" step="0.01" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="expenseNotes">Notes</label>
                        <textarea id="expenseNotes" name="expense_notes" placeholder="Gas, supplies, etc."></textarea>
                    </div>

                    <button type="submit" class="btn-submit expense">Add Expense</button>
                </form>
            </div>
        </div>

        <!-- Summary Section -->
        <div class="summary-section">
            <h2 class="summary-title">&#x1F4CB; Recent Entries</h2>
            <div class="entries-list" id="entriesList">
                <div class="empty-state">
                    <p>No entries yet. Add a job or expense above.</p>
                </div>
            </div>

            <div class="summary-stats">
                <div class="stat-box income">
                    <div class="stat-label">Total Income</div>
                    <div class="stat-value">$<span id="totalIncomeAmount">0.00</span></div>
                </div>
                <div class="stat-box expense">
                    <div class="stat-label">Total Expenses</div>
                    <div class="stat-value">$<span id="totalExpenseAmount">0.00</span></div>
                </div>
                <div class="stat-box profit">
                    <div class="stat-label">Net Profit</div>
                    <div class="stat-value">$<span id="netProfitAmount">0.00</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allEntries = [];
        let allClients = [];
        let allServices = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadClients();
            loadServices();
            setTodayDates();
            document.getElementById('incomeForm').addEventListener('submit', handleIncomeSubmit);
            document.getElementById('expenseForm').addEventListener('submit', handleExpenseSubmit);
        });

        function setTodayDates() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('incomeDate').value = today;
            document.getElementById('expenseDate').value = today;
        }

        async function loadClients() {
            try {
                const response = await fetch('/api/clients');
                if (!response.ok) throw new Error('Failed to load clients');
                allClients = await response.json();
            } catch (error) {
                console.error('Error loading clients:', error);
            }
        }

        async function loadServices() {
            try {
                const response = await fetch('/api/services');
                if (!response.ok) throw new Error('Failed to load services');
                allServices = await response.json();
                
                const select = document.getElementById('incomeService');
                allServices.forEach(service => {
                    const option = document.createElement('option');
                    option.value = service.id;
                    option.textContent = `${service.ServiceName} ($${service.Cost.toFixed(2)})`;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading services:', error);
            }
        }

        async function handleIncomeSubmit(e) {
            e.preventDefault();
            document.getElementById('incomeClientError').textContent = '';
            document.getElementById('incomeServiceError').textContent = '';

            const clientName = document.getElementById('incomeClient').value.trim();
            const serviceId = document.getElementById('incomeService').value;

            if (!clientName) {
                document.getElementById('incomeClientError').textContent = 'Client name is required';
                return;
            }

            if (!serviceId) {
                document.getElementById('incomeServiceError').textContent = 'Service is required';
                return;
            }

            try {
                // Find or create client
                let client = allClients.find(c => c.ClientName.toLowerCase() === clientName.toLowerCase());
                
                if (!client) {
                    const clientResponse = await fetch('/api/clients', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ClientName: clientName })
                    });
                    if (!clientResponse.ok) throw new Error('Failed to create client');
                    client = await clientResponse.json();
                    allClients.push(client);
                }

                // Save job
                const jobData = {
                    client_id: client.id,
                    job_date: document.getElementById('incomeDate').value,
                    service_id: parseInt(serviceId),
                    service_details: document.getElementById('incomeDetails').value || null,
                    income: parseFloat(document.getElementById('incomeAmount').value),
                    expenses: 0,
                    expense_notes: null,
                    status: 'Scheduled'
                };

                const jobResponse = await fetch('/api/jobs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(jobData)
                });

                if (!jobResponse.ok) throw new Error('Failed to save job');

                const job = await jobResponse.json();
                addEntryToDisplay(job, 'income');
                document.getElementById('incomeForm').reset();
                setTodayDates();
                updateSummary();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('incomeClientError').textContent = `Error: ${error.message}`;
            }
        }

        async function handleExpenseSubmit(e) {
            e.preventDefault();
            document.getElementById('expenseClientError').textContent = '';

            const clientName = document.getElementById('expenseClient').value.trim();

            if (!clientName) {
                document.getElementById('expenseClientError').textContent = 'Client name is required';
                return;
            }

            try {
                // Find or create client
                let client = allClients.find(c => c.ClientName.toLowerCase() === clientName.toLowerCase());
                
                if (!client) {
                    const clientResponse = await fetch('/api/clients', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ClientName: clientName })
                    });
                    if (!clientResponse.ok) throw new Error('Failed to create client');
                    client = await clientResponse.json();
                    allClients.push(client);
                }

                // Save expense job
                const jobData = {
                    client_id: client.id,
                    job_date: document.getElementById('expenseDate').value,
                    service_id: 1, // Default service
                    service_details: null,
                    income: 0,
                    expenses: parseFloat(document.getElementById('expenseAmount').value),
                    expense_notes: document.getElementById('expenseNotes').value || null,
                    status: 'Completed'
                };

                const jobResponse = await fetch('/api/jobs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(jobData)
                });

                if (!jobResponse.ok) throw new Error('Failed to save expense');

                const job = await jobResponse.json();
                addEntryToDisplay(job, 'expense');
                document.getElementById('expenseForm').reset();
                setTodayDates();
                updateSummary();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('expenseClientError').textContent = `Error: ${error.message}`;
            }
        }

        function addEntryToDisplay(job, type) {
            const entriesList = document.getElementById('entriesList');
            
            if (entriesList.querySelector('.empty-state')) {
                entriesList.innerHTML = '';
            }

            const entry = document.createElement('div');
            entry.className = `entry-item ${type}`;
            entry.dataset.jobId = job.id;

            const amount = type === 'income' ? job.income : job.expenses;
            const clientName = allClients.find(c => c.id === job.client_id)?.ClientName || 'Unknown';
            const description = type === 'income' ? 
                (job.service_details || 'Job') : 
                (job.expense_notes || 'Expense');

            entry.innerHTML = `
                <div class="entry-content">
                    <div class="entry-date">${formatDate(job.job_date)} \u2022 ${clientName}</div>
                    <div class="entry-description">${description}</div>
                    <div class="entry-amount">$${amount.toFixed(2)}</div>
                </div>
                <button class="entry-delete" onclick="deleteEntry(${job.id})">Delete</button>
            `;

            entriesList.prepend(entry);
            allEntries.unshift({ ...job, type });
        }

        async function deleteEntry(jobId) {
            if (!confirm('Delete this entry?')) return;

            try {
                const response = await fetch(`/api/jobs/${jobId}`, { method: 'DELETE' });
                if (!response.ok) throw new Error('Failed to delete');
                
                document.querySelector(`[data-job-id="${jobId}"]`)?.remove();
                allEntries = allEntries.filter(e => e.id !== jobId);
                
                if (allEntries.length === 0) {
                    document.getElementById('entriesList').innerHTML = '<div class="empty-state"><p>No entries yet. Add a job or expense above.</p></div>';
                }
                
                updateSummary();
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to delete entry');
            }
        }

        function updateSummary() {
            const totalIncome = allEntries.reduce((sum, e) => sum + (e.income || 0), 0);
            const totalExpense = allEntries.reduce((sum, e) => sum + (e.expenses || 0), 0);
            const netProfit = totalIncome - totalExpense;

            document.getElementById('totalIncomeAmount').textContent = totalIncome.toFixed(2);
            document.getElementById('totalExpenseAmount').textContent = totalExpense.toFixed(2);
            document.getElementById('netProfitAmount').textContent = netProfit.toFixed(2);
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr + 'T00:00:00');
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }
    </script>
    <div id="footer-component"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
